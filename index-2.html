<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CityGML → STL Converter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0c10; --surface: #12151c; --surface-hover: #1a1e28;
    --border: #1e2330; --border-active: #3b82f6;
    --accent: #3b82f6; --accent-glow: rgba(59,130,246,0.15);
    --text: #e2e8f0; --text-muted: #64748b; --text-dim: #475569;
    --success: #22c55e; --success-glow: rgba(34,197,94,0.12);
    --warning: #f59e0b; --error: #ef4444;
  }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'DM Sans', 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh; padding: 40px 20px;
  }
  .wrap { max-width: 640px; margin: 0 auto; }

  /* Header */
  .badge {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 6px 14px; background: var(--accent-glow);
    border-radius: 20px; border: 1px solid var(--border);
    font-size: 12px; font-weight: 500; color: var(--accent);
    letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 12px;
  }
  .header { text-align: center; margin-bottom: 40px; }
  .header h1 { font-size: 28px; font-weight: 600; letter-spacing: -0.02em; margin: 0 0 8px; }
  .header p { color: var(--text-muted); font-size: 14px; line-height: 1.5; }

  /* Drop zone */
  .dropzone {
    border: 2px dashed var(--border); border-radius: 12px;
    padding: 60px 40px; text-align: center; cursor: pointer;
    background: var(--surface); transition: all 0.2s ease;
  }
  .dropzone.over { border-color: var(--border-active); background: var(--accent-glow); }
  .dropzone svg { margin-bottom: 16px; }
  .dropzone .main { font-size: 15px; font-weight: 500; margin: 0 0 6px; }
  .dropzone .sub { font-size: 13px; color: var(--text-dim); margin: 0; }

  /* Panels */
  .panel {
    background: var(--surface); border-radius: 12px;
    border: 1px solid var(--border); padding: 16px; margin-bottom: 16px;
  }
  .panel-label {
    margin: 0 0 10px; font-size: 12px; font-weight: 500;
    color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em;
  }

  /* Loading */
  .loading { text-align: center; padding: 40px; }
  .spinner {
    width: 32px; height: 32px; margin: 0 auto 16px;
    border: 3px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading p { font-size: 14px; color: var(--text-muted); }

  /* Error */
  .error-panel { border-color: rgba(239,68,68,0.2); }
  .error-panel .err-wrap { display: flex; align-items: flex-start; gap: 12px; }
  .error-panel .err-title { font-weight: 500; font-size: 14px; margin: 0 0 4px; }
  .error-panel .err-msg { color: var(--text-muted); font-size: 13px; margin: 0 0 16px; }
  .btn-secondary {
    background: var(--surface-hover); border: 1px solid var(--border);
    color: var(--text); padding: 8px 16px; border-radius: 8px;
    font-size: 13px; cursor: pointer; font-family: inherit;
  }

  /* Preview canvas */
  #preview {
    width: 100%; height: 280px; border-radius: 8px;
    background: var(--bg); cursor: grab; border: 1px solid var(--border);
  }

  /* Stats grid */
  .stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; padding: 20px; }
  .stat-val {
    font-size: 20px; font-weight: 600; text-align: center;
    font-family: 'JetBrains Mono', monospace;
  }
  .stat-lbl { font-size: 11px; color: var(--text-dim); text-align: center; margin-top: 2px; }

  /* Geo info */
  .geo-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 6px; }
  .geo-row .label { color: var(--text-muted); }
  .geo-row .value { font-family: 'JetBrains Mono', monospace; font-size: 12px; max-width: 70%; text-align: right; word-break: break-all; }
  .geo-ok {
    margin-top: 6px; padding: 8px 10px; background: var(--success-glow);
    border-radius: 6px; font-size: 12px; color: var(--success);
    display: flex; align-items: center; gap: 6px;
  }

  /* Warning */
  .warn-panel {
    border-color: rgba(245,158,11,0.2); display: flex;
    align-items: center; gap: 10px; font-size: 13px; color: var(--warning); padding: 14px;
  }

  /* Download bar */
  .dl-bar { display: flex; align-items: center; justify-content: space-between; padding: 20px; }
  .dl-name { font-size: 14px; font-weight: 500; margin: 0; }
  .dl-meta { font-size: 12px; color: var(--text-dim); margin: 4px 0 0; }
  .btn-primary {
    background: var(--accent); border: none; color: #fff;
    padding: 10px 24px; border-radius: 8px; font-size: 14px;
    font-weight: 500; cursor: pointer; font-family: inherit;
    display: flex; align-items: center; gap: 8px;
  }

  /* Reset link */
  .reset-btn {
    background: none; border: none; color: var(--text-muted);
    font-size: 13px; cursor: pointer; padding: 8px; width: 100%;
    font-family: inherit; margin-bottom: 16px;
  }

  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="wrap">
  <!-- Header -->
  <div class="header">
    <div class="badge">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      3D Converter
    </div>
    <h1>CityGML → STL</h1>
    <p>Drop a CityGML file to extract 3D geometry and export as binary STL</p>
  </div>

  <!-- Drop zone -->
  <div id="dropzone" class="dropzone">
    <input type="file" id="fileinput" accept=".gml,.xml,.citygml" style="display:none">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--text-dim)" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    <p class="main">Drop CityGML file here</p>
    <p class="sub">.gml, .xml, .citygml</p>
  </div>

  <!-- Loading -->
  <div id="loading" class="panel loading hidden">
    <div class="spinner"></div>
    <p id="loadingText">Parsing…</p>
  </div>

  <!-- Error -->
  <div id="errorPanel" class="panel error-panel hidden">
    <div class="err-wrap">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="var(--error)" style="flex-shrink:0;margin-top:1px"><circle cx="12" cy="12" r="10" opacity="0.15"/><path d="M12 8v4m0 4h.01" stroke="var(--error)" stroke-width="2" stroke-linecap="round" fill="none"/></svg>
      <div>
        <p class="err-title">Conversion failed</p>
        <p class="err-msg" id="errorMsg"></p>
        <button class="btn-secondary" onclick="resetUI()">Try another file</button>
      </div>
    </div>
  </div>

  <!-- Results -->
  <div id="results" class="hidden">
    <!-- Preview -->
    <div class="panel">
      <p class="panel-label">Preview — drag to rotate</p>
      <canvas id="preview" width="600" height="400"></canvas>
    </div>

    <!-- Stats -->
    <div class="panel stats" id="statsGrid"></div>

    <!-- Georeferencing -->
    <div class="panel" id="geoPanel">
      <p class="panel-label">Georeferencing</p>
      <div id="geoInfo"></div>
    </div>

    <!-- Warning -->
    <div id="warnPanel" class="panel warn-panel hidden"></div>

    <!-- Download -->
    <div class="panel dl-bar">
      <div>
        <p class="dl-name" id="dlName"></p>
        <p class="dl-meta" id="dlMeta"></p>
      </div>
      <button class="btn-primary" id="dlBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download
      </button>
    </div>

    <button class="reset-btn" onclick="resetUI()">Convert another file</button>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════
//  Earcut triangulation (minimal port)
// ════════════════════════════════════════════════════
function earcut(data,holeIndices,dim){dim=dim||2;var hasHoles=holeIndices&&holeIndices.length,outerLen=hasHoles?holeIndices[0]*dim:data.length,outerNode=linkedList(data,0,outerLen,dim,true),triangles=[];if(!outerNode||outerNode.next===outerNode.prev)return triangles;if(hasHoles)outerNode=eliminateHoles(data,holeIndices,outerNode,dim);var minX,minY,maxX,maxY,invSize;if(data.length>80*dim){minX=maxX=data[0];minY=maxY=data[1];for(var i=dim;i<outerLen;i+=dim){var x=data[i],y=data[i+1];if(x<minX)minX=x;if(y<minY)minY=y;if(x>maxX)maxX=x;if(y>maxY)maxY=y}invSize=Math.max(maxX-minX,maxY-minY);invSize=invSize!==0?1/invSize:0}earcutLinked(outerNode,triangles,dim,minX,minY,invSize,0);return triangles}
function linkedList(data,start,end,dim,clockwise){var last;if(clockwise===(signedArea(data,start,end,dim)>0)){for(var i=start;i<end;i+=dim)last=insertNode(i,data[i],data[i+1],last)}else{for(var i=end-dim;i>=start;i-=dim)last=insertNode(i,data[i],data[i+1],last)}if(last&&equals(last,last.next)){removeNode(last);last=last.next}if(!last)return null;last.next.prev=last;last.prev.next=last;return last.next}
function filterPoints(start,end){if(!start)return start;if(!end)end=start;var p=start,again;do{again=false;if(!p.steiner&&(equals(p,p.next)||area(p.prev,p,p.next)===0)){removeNode(p);p=end=p.prev;if(p===p.next)break;again=true}else{p=p.next}}while(again||p!==end);return end}
function earcutLinked(ear,triangles,dim,minX,minY,invSize,pass){if(!ear)return;if(!pass&&invSize)indexCurve(ear,minX,minY,invSize);var stop=ear,prev,next;while(ear.prev!==ear.next){prev=ear.prev;next=ear.next;if(invSize?isEarHashed(ear,minX,minY,invSize):isEar(ear)){triangles.push(prev.i/dim,ear.i/dim,next.i/dim);removeNode(ear);ear=next.next;stop=next.next;continue}ear=next;if(ear===stop){if(!pass)earcutLinked(filterPoints(ear),triangles,dim,minX,minY,invSize,1);else if(pass===1){ear=cureLocalIntersections(filterPoints(ear),triangles,dim);earcutLinked(ear,triangles,dim,minX,minY,invSize,2)}else if(pass===2)splitEarcut(ear,triangles,dim,minX,minY,invSize);break}}}
function isEar(ear){var a=ear.prev,b=ear,c=ear.next;if(area(a,b,c)>=0)return false;var p=ear.next.next;while(p!==ear.prev){if(pointInTriangle(a.x,a.y,b.x,b.y,c.x,c.y,p.x,p.y)&&area(p.prev,p,p.next)>=0)return false;p=p.next}return true}
function isEarHashed(ear,minX,minY,invSize){var a=ear.prev,b=ear,c=ear.next;if(area(a,b,c)>=0)return false;var minTX=Math.min(a.x,b.x,c.x),minTY=Math.min(a.y,b.y,c.y),maxTX=Math.max(a.x,b.x,c.x),maxTY=Math.max(a.y,b.y,c.y);var minZ=zOrder(minTX,minTY,minX,minY,invSize),maxZ=zOrder(maxTX,maxTY,minX,minY,invSize);var p=ear.prevZ,n=ear.nextZ;while(p&&p.z>=minZ&&n&&n.z<=maxZ){if(p!==ear.prev&&p!==ear.next&&pointInTriangle(a.x,a.y,b.x,b.y,c.x,c.y,p.x,p.y)&&area(p.prev,p,p.next)>=0)return false;p=p.prevZ;if(n!==ear.prev&&n!==ear.next&&pointInTriangle(a.x,a.y,b.x,b.y,c.x,c.y,n.x,n.y)&&area(n.prev,n,n.next)>=0)return false;n=n.nextZ}while(p&&p.z>=minZ){if(p!==ear.prev&&p!==ear.next&&pointInTriangle(a.x,a.y,b.x,b.y,c.x,c.y,p.x,p.y)&&area(p.prev,p,p.next)>=0)return false;p=p.prevZ}while(n&&n.z<=maxZ){if(n!==ear.prev&&n!==ear.next&&pointInTriangle(a.x,a.y,b.x,b.y,c.x,c.y,n.x,n.y)&&area(n.prev,n,n.next)>=0)return false;n=n.nextZ}return true}
function cureLocalIntersections(start,triangles,dim){var p=start;do{var a=p.prev,b=p.next.next;if(!equals(a,b)&&intersects(a,p,p.next,b)&&locallyInside(a,b)&&locallyInside(b,a)){triangles.push(a.i/dim,p.i/dim,b.i/dim);removeNode(p);removeNode(p.next);p=start=b}p=p.next}while(p!==start);return filterPoints(p)}
function splitEarcut(start,triangles,dim,minX,minY,invSize){var a=start;do{var b=a.next.next;while(b!==a.prev){if(a.i!==b.i&&isValidDiagonal(a,b)){var c=splitPolygon(a,b);a=filterPoints(a,a.next);c=filterPoints(c,c.next);earcutLinked(a,triangles,dim,minX,minY,invSize,0);earcutLinked(c,triangles,dim,minX,minY,invSize,0);return}b=b.next}a=a.next}while(a!==start)}
function eliminateHoles(data,holeIndices,outerNode,dim){var queue=[];for(var i=0,len=holeIndices.length;i<len;i++){var start=holeIndices[i]*dim;var end=i<len-1?holeIndices[i+1]*dim:data.length;var list=linkedList(data,start,end,dim,false);if(list===list.next)list.steiner=true;queue.push(getLeftmost(list))}queue.sort(function(a,b){return a.x-b.x});for(var i=0;i<queue.length;i++)outerNode=eliminateHole(queue[i],outerNode);return outerNode}
function eliminateHole(hole,outerNode){outerNode=findHoleBridge(hole,outerNode);if(outerNode){var b=splitPolygon(outerNode,hole);filterPoints(outerNode,outerNode.next);filterPoints(b,b.next)}}
function findHoleBridge(hole,outerNode){var p=outerNode,hx=hole.x,hy=hole.y,qx=-Infinity,m;do{if(hy<=p.y&&hy>=p.next.y&&p.next.y!==p.y){var x=p.x+(hy-p.y)*(p.next.x-p.x)/(p.next.y-p.y);if(x<=hx&&x>qx){qx=x;if(x===hx){if(hy===p.y)return p;if(hy===p.next.y)return p.next}m=p.x<p.next.x?p:p.next}}p=p.next}while(p!==outerNode);if(!m)return null;if(hx===qx)return m;var stop=m,mx=m.x,my=m.y,tanMin=Infinity,tan;p=m;do{if(hx>=p.x&&p.x>=mx&&hx!==p.x&&pointInTriangle(hy<my?hx:qx,hy,mx,my,hy<my?qx:hx,hy,p.x,p.y)){tan=Math.abs(hy-p.y)/(hx-p.x);if(locallyInside(p,hole)&&(tan<tanMin||(tan===tanMin&&(p.x>m.x||(p.x===m.x&&sectorContainsSector(m,p))))))  {m=p;tanMin=tan}}p=p.next}while(p!==stop);return m}
function sectorContainsSector(m,p){return area(m.prev,m,p.prev)<0&&area(p.next,m,m.next)<0}
function indexCurve(start,minX,minY,invSize){var p=start;do{if(p.z===null)p.z=zOrder(p.x,p.y,minX,minY,invSize);p.prevZ=p.prev;p.nextZ=p.next;p=p.next}while(p!==start);p.prevZ.nextZ=null;p.prevZ=null;sortLinked(p)}
function sortLinked(list){var i,p,q,e,tail,numMerges,pSize,qSize,inSize=1;do{p=list;list=null;tail=null;numMerges=0;while(p){numMerges++;q=p;pSize=0;for(i=0;i<inSize;i++){pSize++;q=q.nextZ;if(!q)break}qSize=inSize;while(pSize>0||(qSize>0&&q)){if(pSize!==0&&(qSize===0||!q||p.z<=q.z)){e=p;p=p.nextZ;pSize--}else{e=q;q=q.nextZ;qSize--}if(tail)tail.nextZ=e;else list=e;e.prevZ=tail;tail=e}p=q}tail.nextZ=null;inSize*=2}while(numMerges>1);return list}
function zOrder(x,y,minX,minY,invSize){x=32767*(x-minX)*invSize;y=32767*(y-minY)*invSize;x=(x|(x<<8))&0x00FF00FF;x=(x|(x<<4))&0x0F0F0F0F;x=(x|(x<<2))&0x33333333;x=(x|(x<<1))&0x55555555;y=(y|(y<<8))&0x00FF00FF;y=(y|(y<<4))&0x0F0F0F0F;y=(y|(y<<2))&0x33333333;y=(y|(y<<1))&0x55555555;return x|(y<<1)}
function getLeftmost(start){var p=start,leftmost=start;do{if(p.x<leftmost.x||(p.x===leftmost.x&&p.y<leftmost.y))leftmost=p;p=p.next}while(p!==start);return leftmost}
function pointInTriangle(ax,ay,bx,by,cx,cy,px,py){return(cx-px)*(ay-py)-(ax-px)*(cy-py)>=0&&(ax-px)*(by-py)-(bx-px)*(ay-py)>=0&&(bx-px)*(cy-py)-(cx-px)*(by-py)>=0}
function isValidDiagonal(a,b){return a.next.i!==b.i&&a.prev.i!==b.i&&!intersectsPolygon(a,b)&&(locallyInside(a,b)&&locallyInside(b,a)&&middleInside(a,b)&&(area(a.prev,a,b.prev)||area(a,b.prev,b))||equals(a,b)&&area(a.prev,a,a.next)>0&&area(b.prev,b,b.next)>0)}
function area(p,q,r){return(q.y-p.y)*(r.x-q.x)-(q.x-p.x)*(r.y-q.y)}
function equals(p1,p2){return p1.x===p2.x&&p1.y===p2.y}
function intersects(p1,q1,p2,q2){var o1=sign(area(p1,q1,p2)),o2=sign(area(p1,q1,q2)),o3=sign(area(p2,q2,p1)),o4=sign(area(p2,q2,q1));if(o1!==o2&&o3!==o4)return true;if(o1===0&&onSegment(p1,p2,q1))return true;if(o2===0&&onSegment(p1,q2,q1))return true;if(o3===0&&onSegment(p2,p1,q2))return true;if(o4===0&&onSegment(p2,q1,q2))return true;return false}
function onSegment(p,q,r){return q.x<=Math.max(p.x,r.x)&&q.x>=Math.min(p.x,r.x)&&q.y<=Math.max(p.y,r.y)&&q.y>=Math.min(p.y,r.y)}
function sign(num){return num>0?1:num<0?-1:0}
function intersectsPolygon(a,b){var p=a;do{if(p.i!==a.i&&p.next.i!==a.i&&p.i!==b.i&&p.next.i!==b.i&&intersects(p,p.next,a,b))return true;p=p.next}while(p!==a);return false}
function locallyInside(a,b){return area(a.prev,a,a.next)<0?area(a,b,a.next)>=0&&area(a,a.prev,b)>=0:area(a,b,a.prev)<0||area(a,a.next,b)<0}
function middleInside(a,b){var p=a,inside=false,px=(a.x+b.x)/2,py=(a.y+b.y)/2;do{if(((p.y>py)!==(p.next.y>py))&&p.next.y!==p.y&&(px<(p.next.x-p.x)*(py-p.y)/(p.next.y-p.y)+p.x))inside=!inside;p=p.next}while(p!==a);return inside}
function splitPolygon(a,b){var a2=createNode(a.i,a.x,a.y),b2=createNode(b.i,b.x,b.y),an=a.next,bp=b.prev;a.next=b;b.prev=a;a2.next=an;an.prev=a2;b2.next=a2;a2.prev=b2;bp.next=b2;b2.prev=bp;return b2}
function insertNode(i,x,y,last){var p=createNode(i,x,y);if(!last){p.prev=p;p.next=p}else{p.next=last.next;p.prev=last;last.next.prev=p;last.next=p}return p}
function removeNode(p){p.next.prev=p.prev;p.prev.next=p.next;if(p.prevZ)p.prevZ.nextZ=p.nextZ;if(p.nextZ)p.nextZ.prevZ=p.prevZ}
function createNode(i,x,y){return{i:i,x:x,y:y,prev:null,next:null,z:null,prevZ:null,nextZ:null,steiner:false}}
function signedArea(data,start,end,dim){var sum=0;for(var i=start,j=end-dim;i<end;i+=dim){sum+=(data[j]-data[i])*(data[i+1]+data[j+1]);j=i}return sum}

// ════════════════════════════════════════════════════
//  CityGML Parsing
// ════════════════════════════════════════════════════
function parseCityGML(xmlText) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(xmlText, "text/xml");
  const parseError = doc.querySelector("parsererror");
  if (parseError) throw new Error("Invalid XML: " + parseError.textContent.slice(0, 200));

  const polygons = [];
  const stats = { buildings: 0, surfaces: 0, polygons: 0 };

  let crs = null;
  const envelopes = doc.getElementsByTagNameNS("*", "Envelope");
  for (const env of envelopes) { const s = env.getAttribute("srsName"); if (s) { crs = s; break; } }
  if (!crs) { const all = doc.querySelectorAll("[srsName]"); if (all.length) crs = all[0].getAttribute("srsName"); }

  const allPolygons = doc.getElementsByTagNameNS("*", "Polygon");
  if (allPolygons.length === 0) {
    const rings = doc.getElementsByTagNameNS("*", "LinearRing");
    for (const ring of rings) { const c = extractRingCoords(ring); if (c && c.length >= 3) { polygons.push(c); stats.polygons++; } }
  } else {
    for (const poly of allPolygons) {
      const ext = poly.getElementsByTagNameNS("*", "exterior")[0]; if (!ext) continue;
      const ring = ext.getElementsByTagNameNS("*", "LinearRing")[0]; if (!ring) continue;
      const c = extractRingCoords(ring); if (c && c.length >= 3) { polygons.push(c); stats.polygons++; }
    }
  }

  for (const t of ["Building","BuildingPart","BuildingInstallation"]) stats.buildings += doc.getElementsByTagNameNS("*", t).length;
  for (const t of ["WallSurface","RoofSurface","GroundSurface","ClosureSurface","FloorSurface","OuterFloorSurface","OuterCeilingSurface"]) stats.surfaces += doc.getElementsByTagNameNS("*", t).length;

  return { polygons, stats, crs };
}

function extractRingCoords(ring) {
  const posList = ring.getElementsByTagNameNS("*", "posList")[0];
  if (posList) {
    const nums = posList.textContent.trim().split(/\s+/).map(Number);
    const dim = parseInt(posList.getAttribute("srsDimension") || posList.getAttribute("dimension") || "3");
    const coords = [];
    for (let i = 0; i + dim - 1 < nums.length; i += dim) coords.push([nums[i], nums[i+1], dim >= 3 ? nums[i+2] : 0]);
    if (coords.length > 1) { const f=coords[0],l=coords[coords.length-1]; if(f[0]===l[0]&&f[1]===l[1]&&f[2]===l[2]) coords.pop(); }
    return coords;
  }
  const posElems = ring.getElementsByTagNameNS("*", "pos");
  if (posElems.length > 0) {
    const coords = [];
    for (const p of posElems) { const n = p.textContent.trim().split(/\s+/).map(Number); coords.push([n[0], n[1], n.length>=3?n[2]:0]); }
    if (coords.length > 1) { const f=coords[0],l=coords[coords.length-1]; if(f[0]===l[0]&&f[1]===l[1]&&f[2]===l[2]) coords.pop(); }
    return coords;
  }
  const coordinates = ring.getElementsByTagNameNS("*", "coordinates")[0];
  if (coordinates) {
    const tuples = coordinates.textContent.trim().split(/\s+/);
    const coords = tuples.map(t => { const p = t.split(",").map(Number); return [p[0], p[1], p.length>=3?p[2]:0]; });
    if (coords.length > 1) { const f=coords[0],l=coords[coords.length-1]; if(f[0]===l[0]&&f[1]===l[1]&&f[2]===l[2]) coords.pop(); }
    return coords;
  }
  return null;
}

// ════════════════════════════════════════════════════
//  Triangulation & STL
// ════════════════════════════════════════════════════
function cleanPolygonVertices(verts) {
  const EPS = 1e-8, cleaned = [verts[0]];
  for (let i = 1; i < verts.length; i++) {
    const p = cleaned[cleaned.length-1], c = verts[i];
    const dx=c[0]-p[0], dy=c[1]-p[1], dz=c[2]-p[2];
    if (dx*dx+dy*dy+dz*dz > EPS*EPS) cleaned.push(c);
  }
  if (cleaned.length > 1) { const f=cleaned[0],l=cleaned[cleaned.length-1]; const dx=f[0]-l[0],dy=f[1]-l[1],dz=f[2]-l[2]; if(dx*dx+dy*dy+dz*dz<EPS*EPS) cleaned.pop(); }
  return cleaned;
}

function removeCollinearVertices(verts) {
  const EPS = 1e-10;
  if (verts.length <= 3) return verts;
  const result = [], n = verts.length;
  for (let i = 0; i < n; i++) {
    const pr = verts[(i-1+n)%n], cu = verts[i], nx = verts[(i+1)%n];
    const ux=cu[0]-pr[0],uy=cu[1]-pr[1],uz=cu[2]-pr[2];
    const vx=nx[0]-pr[0],vy=nx[1]-pr[1],vz=nx[2]-pr[2];
    const cx=uy*vz-uz*vy, cy=uz*vx-ux*vz, cz=ux*vy-uy*vx;
    if (cx*cx+cy*cy+cz*cz > EPS) result.push(cu);
  }
  return result.length >= 3 ? result : verts;
}

function fanTriangulate(n) { const idx = []; for (let i = 1; i < n-1; i++) idx.push(0, i, i+1); return idx; }

function triangulatePolygon(vertices3d) {
  if (vertices3d.length < 3) return [];
  if (vertices3d.length === 3) return [0, 1, 2];
  let verts = cleanPolygonVertices(vertices3d);
  verts = removeCollinearVertices(verts);
  if (verts.length < 3) return [];
  if (verts.length === 3) return [0, 1, 2];

  const norm = [0,0,0];
  for (let i = 0; i < verts.length; i++) {
    const c = verts[i], nx = verts[(i+1)%verts.length];
    norm[0] += (c[1]-nx[1])*(c[2]+nx[2]);
    norm[1] += (c[2]-nx[2])*(c[0]+nx[0]);
    norm[2] += (c[0]-nx[0])*(c[1]+nx[1]);
  }
  const len = Math.sqrt(norm[0]*norm[0]+norm[1]*norm[1]+norm[2]*norm[2]);
  if (len < 1e-10) return fanTriangulate(verts.length);
  norm[0]/=len; norm[1]/=len; norm[2]/=len;

  let refIdx=0, maxEdgeLen=0;
  for (let i = 0; i < verts.length; i++) {
    const nx = verts[(i+1)%verts.length];
    const dx=nx[0]-verts[i][0], dy=nx[1]-verts[i][1], dz=nx[2]-verts[i][2];
    const el = dx*dx+dy*dy+dz*dz;
    if (el > maxEdgeLen) { maxEdgeLen = el; refIdx = i; }
  }
  const rn = verts[(refIdx+1)%verts.length];
  let tx=rn[0]-verts[refIdx][0], ty=rn[1]-verts[refIdx][1], tz=rn[2]-verts[refIdx][2];
  const tlen = Math.sqrt(tx*tx+ty*ty+tz*tz);
  if (tlen < 1e-12) return fanTriangulate(verts.length);
  tx/=tlen; ty/=tlen; tz/=tlen;

  let bx=norm[1]*tz-norm[2]*ty, by=norm[2]*tx-norm[0]*tz, bz=norm[0]*ty-norm[1]*tx;
  const blen = Math.sqrt(bx*bx+by*by+bz*bz);
  if (blen < 1e-12) return fanTriangulate(verts.length);
  bx/=blen; by/=blen; bz/=blen;

  const coords2d = [], origin = verts[0];
  for (const pt of verts) {
    const dx=pt[0]-origin[0], dy=pt[1]-origin[1], dz=pt[2]-origin[2];
    coords2d.push(dx*tx+dy*ty+dz*tz, dx*bx+dy*by+dz*bz);
  }
  try {
    const result = earcut(coords2d);
    if (result.length >= 3) return result;
    return fanTriangulate(verts.length);
  } catch(e) { return fanTriangulate(verts.length); }
}

function computeNormal(a, b, c) {
  const ux=b[0]-a[0],uy=b[1]-a[1],uz=b[2]-a[2];
  const vx=c[0]-a[0],vy=c[1]-a[1],vz=c[2]-a[2];
  const nx=uy*vz-uz*vy, ny=uz*vx-ux*vz, nz=ux*vy-uy*vx;
  const len = Math.sqrt(nx*nx+ny*ny+nz*nz);
  if (len < 1e-10) return [0,0,1];
  return [nx/len, ny/len, nz/len];
}

function polygonsToSTL(polygons) {
  let cx=0, cy=0, cz=0, count=0;
  for (const poly of polygons) for (const v of poly) { cx+=v[0]; cy+=v[1]; cz+=v[2]; count++; }
  if (count) { cx/=count; cy/=count; cz/=count; }

  const triangles = [];
  let skippedPolygons = 0;
  for (const poly of polygons) {
    let cleaned = cleanPolygonVertices(poly);
    cleaned = removeCollinearVertices(cleaned);
    if (cleaned.length < 3) { skippedPolygons++; continue; }
    const indices = triangulatePolygon(cleaned);
    for (let i = 0; i+2 < indices.length; i += 3) {
      const a=cleaned[indices[i]], b=cleaned[indices[i+1]], c=cleaned[indices[i+2]];
      if (!a||!b||!c) continue;
      triangles.push({ normal: computeNormal(a,b,c), v1:a, v2:b, v3:c });
    }
  }

  const numTriangles = triangles.length;
  const buf = new ArrayBuffer(84 + numTriangles * 50);
  const view = new DataView(buf);
  const header = "CityGML to STL - georeferenced";
  for (let i = 0; i < 80; i++) view.setUint8(i, i < header.length ? header.charCodeAt(i) : 0);
  view.setUint32(80, numTriangles, true);

  let off = 84;
  for (const tri of triangles) {
    view.setFloat32(off, tri.normal[0], true); off+=4;
    view.setFloat32(off, tri.normal[1], true); off+=4;
    view.setFloat32(off, tri.normal[2], true); off+=4;
    for (const v of [tri.v1, tri.v2, tri.v3]) {
      view.setFloat32(off, v[0], true); off+=4;
      view.setFloat32(off, v[1], true); off+=4;
      view.setFloat32(off, v[2], true); off+=4;
    }
    view.setUint16(off, 0, true); off+=2;
  }
  return { buffer: buf, numTriangles, centroid: [cx,cy,cz], skippedPolygons };
}

// ════════════════════════════════════════════════════
//  3D Preview
// ════════════════════════════════════════════════════
let previewPolygons = null;
let rotation = { x: -0.5, y: 0.4 };
let dragging = null;

function drawPreview() {
  const canvas = document.getElementById('preview');
  if (!canvas || !previewPolygons || !previewPolygons.length) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  let cx=0, cy=0, cz=0, count=0;
  for (const poly of previewPolygons) for (const v of poly) { cx+=v[0]; cy+=v[1]; cz+=v[2]; count++; }
  if (count) { cx/=count; cy/=count; cz/=count; }

  let maxDist = 0;
  for (const poly of previewPolygons) for (const v of poly) {
    const d = Math.sqrt((v[0]-cx)**2 + (v[1]-cy)**2 + (v[2]-cz)**2);
    if (d > maxDist) maxDist = d;
  }
  const scale = (Math.min(W,H)*0.4) / (maxDist||1);
  const cosX=Math.cos(rotation.x), sinX=Math.sin(rotation.x);
  const cosY=Math.cos(rotation.y), sinY=Math.sin(rotation.y);

  function project(v) {
    let x=(v[0]-cx)*scale, y=(v[1]-cy)*scale, z=(v[2]-cz)*scale;
    const x1=x*cosY-z*sinY, z1=x*sinY+z*cosY;
    const y1=y*cosX-z1*sinX;
    return [W/2+x1, H/2-y1];
  }

  ctx.clearRect(0, 0, W, H);
  ctx.strokeStyle = 'rgba(59,130,246,0.35)';
  ctx.lineWidth = 0.5;
  for (const poly of previewPolygons) {
    if (poly.length < 2) continue;
    ctx.beginPath();
    const [px,py] = project(poly[0]);
    ctx.moveTo(px, py);
    for (let i = 1; i < poly.length; i++) { const [px2,py2] = project(poly[i]); ctx.lineTo(px2,py2); }
    ctx.closePath();
    ctx.stroke();
  }
}

document.addEventListener('DOMContentLoaded', () => {
  const canvas = document.getElementById('preview');
  canvas.addEventListener('mousedown', e => {
    dragging = { x: e.clientX, y: e.clientY, rx: rotation.x, ry: rotation.y };
  });
  window.addEventListener('mousemove', e => {
    if (!dragging) return;
    rotation.x = dragging.rx + (e.clientY - dragging.y) * 0.005;
    rotation.y = dragging.ry + (e.clientX - dragging.x) * 0.005;
    drawPreview();
  });
  window.addEventListener('mouseup', () => { dragging = null; });
});

// ════════════════════════════════════════════════════
//  UI Logic
// ════════════════════════════════════════════════════
let currentFile = null;
let currentResult = null;

function show(id) { document.getElementById(id).classList.remove('hidden'); }
function hide(id) { document.getElementById(id).classList.add('hidden'); }

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/(1024*1024)).toFixed(1) + ' MB';
}

function resetUI() {
  currentFile = null; currentResult = null; previewPolygons = null;
  hide('loading'); hide('errorPanel'); hide('results');
  show('dropzone');
}

function processFile(file) {
  currentFile = file;
  hide('dropzone'); hide('errorPanel'); hide('results');
  show('loading');
  document.getElementById('loadingText').textContent = 'Parsing ' + file.name + '…';

  const reader = new FileReader();
  reader.onload = () => {
    try {
      const { polygons, stats, crs } = parseCityGML(reader.result);
      if (!polygons.length) throw new Error('No polygon geometry found. Make sure it is a valid CityGML file with 3D geometry.');
      const { buffer, numTriangles, centroid, skippedPolygons } = polygonsToSTL(polygons);

      currentResult = { buffer, numTriangles, centroid, skippedPolygons, stats, crs, polygons };
      previewPolygons = polygons;

      // Stats
      const grid = document.getElementById('statsGrid');
      grid.innerHTML = [['Buildings', stats.buildings],['Surfaces', stats.surfaces],['Polygons', stats.polygons],['Triangles', numTriangles]]
        .map(([l,v]) => `<div><div class="stat-val">${v.toLocaleString()}</div><div class="stat-lbl">${l}</div></div>`).join('');

      // Geo info
      document.getElementById('geoInfo').innerHTML = `
        <div class="geo-row"><span class="label">CRS</span><span class="value" style="color:${crs?'var(--text)':'var(--text-dim)'}">${crs||'Not specified in file'}</span></div>
        <div class="geo-row"><span class="label">Centroid</span><span class="value">${centroid.map(v=>v.toFixed(2)).join(', ')}</span></div>
        <div class="geo-ok"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>Original coordinates preserved in STL</div>`;

      // Warning
      const wp = document.getElementById('warnPanel');
      if (skippedPolygons > 0) {
        wp.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>${skippedPolygons} degenerate polygon${skippedPolygons>1?'s':''} skipped`;
        show('warnPanel');
      } else { hide('warnPanel'); }

      // Download info
      const baseName = file.name.replace(/\.(gml|xml|citygml)$/i, '');
      document.getElementById('dlName').textContent = baseName + '.stl';
      document.getElementById('dlMeta').textContent = 'Binary STL · ' + formatSize(buffer.byteLength);

      hide('loading');
      show('results');
      drawPreview();
    } catch (err) {
      hide('loading');
      document.getElementById('errorMsg').textContent = err.message;
      show('errorPanel');
    }
  };
  reader.onerror = () => { hide('loading'); document.getElementById('errorMsg').textContent = 'Failed to read file'; show('errorPanel'); };
  reader.readAsText(file);
}

// Drop zone & file input
const dz = document.getElementById('dropzone');
const fi = document.getElementById('fileinput');
dz.addEventListener('click', () => fi.click());
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('over'));
dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('over'); if (e.dataTransfer.files[0]) processFile(e.dataTransfer.files[0]); });
fi.addEventListener('change', e => { if (e.target.files[0]) processFile(e.target.files[0]); });

// Download button
document.getElementById('dlBtn').addEventListener('click', () => {
  if (!currentResult) return;
  const blob = new Blob([currentResult.buffer], { type: 'application/octet-stream' });
  const url = URL.createObjectURL(blob);
  const baseName = currentFile.name.replace(/\.(gml|xml|citygml)$/i, '');
  const a = document.createElement('a');
  a.href = url; a.download = baseName + '.stl'; a.style.display = 'none';
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 1000);
});
</script>
